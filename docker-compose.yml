services:
  app:
    image: php:8.2-fpm
    build:
      context: .
      dockerfile: docker/php/Dockerfile  # Dockerfileを使用
    container_name: dev-ai-app  # container_nameも追加
    volumes:
      - ./:/var/www/html
    networks:
      - dev-ai-network  # ← これを追加
    entrypoint: >
      /bin/sh -c "
      chown -R www-data:www-data /var/www/html/storage /var/www/html/bootstrap/cache &&
      chmod -R 775 /var/www/html/storage /var/www/html/bootstrap/cache &&
      php-fpm
      "
  web:
    image: nginx:stable
    container_name: dev-ai-web
    ports:
      - "8038:80"
    volumes:
      - .:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - dev-ai-network

  db:
    image: mariadb:11
    container_name: dev-ai-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: dev_ai
      MYSQL_USER: devuser
      MYSQL_PASSWORD: devpass
    ports:
      - "4306:3306"
    networks:
      - dev-ai-network

networks:
  dev-ai-network:
    driver: bridge
